<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BaseballIQ — Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080b12;
      --surface:  #0e1420;
      --surface2: #141c2e;
      --border:   #1e2a42;
      --border2:  #253550;
      --accent:   #3b82f6;
      --accent2:  #10b981;
      --warn:     #f59e0b;
      --danger:   #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --dim:      #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-ball {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }
    .header-right {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
    }

    /* ── LEAGUE TABS ── */
    .league-tabs {
      width: 100%;
      max-width: 760px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .tab-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 8px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .tab-btn .tab-icon { font-size: 1.3rem; }
    .tab-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .tab-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #3b82f610;
    }
    .tab-btn.active-npb { border-color: #e91e7a; color: #e91e7a; background: #e91e7a10; }
    .tab-btn.active-ncaa { border-color: var(--warn); color: var(--warn); background: #f59e0b10; }
    .tab-btn.active-milb { border-color: var(--accent2); color: var(--accent2); background: #10b98110; }

    /* ── MAIN PANEL ── */
    .main-panel {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 8px 0;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── GAME CARDS (mlb-panel inherits these) ── */
    #mlbGamesPanel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    /* MLB row/col classes - upgraded */
    .mlb-team-col {
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid var(--border);
    }
    .mlb-team-col-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .mlb-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.76rem;
      color: var(--muted);
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .mlb-row span:last-child { color: var(--text); font-weight: 500; font-family: 'DM Mono', monospace; }
    .mlb-row-section {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 8px 0 4px;
    }
    .mlb-odd-box {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .mlb-odd-label { font-size: 0.6rem; color: var(--muted); margin-bottom: 3px; font-family: 'DM Mono', monospace; }
    .mlb-odd-value { font-size: 1rem; font-weight: 700; font-family: 'DM Mono', monospace; }
    .mlb-extra-mini {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px;
      border: 1px solid var(--border);
    }
    .mlb-extra-mini-label { font-size: 0.6rem; color: var(--muted); margin-bottom: 3px; font-family: 'DM Mono', monospace; }
    .mlb-extra-mini-value { font-size: 0.8rem; color: var(--text); font-weight: 500; }

    /* ── SEMÁFORO BADGES ── */
    .mlb-rec-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      text-align: center;
      flex-wrap: wrap;
      font-family: 'Inter', sans-serif;
    }
    .rec-good  { background: #10b98112; color: var(--accent2); border: 1px solid #10b98133; }
    .rec-tight { background: #f59e0b12; color: var(--warn);    border: 1px solid #f59e0b33; }
    .rec-avoid { background: #ef444412; color: var(--danger);  border: 1px solid #ef444433; }

    /* ── PROPS BTN ── */
    .props-btn {
      transition: all 0.18s;
    }
    .props-btn:hover {
      background: #3b82f615 !important;
      border-color: var(--accent) !important;
      color: var(--accent) !important;
    }

    /* ── LOADER ── */
    .loader-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--muted);
      font-size: 0.85rem;
      gap: 12px;
    }
    .spin {
      width: 20px; height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-size: 1rem; color: var(--text); margin-bottom: 8px; font-weight: 600; }
    .empty-state p { font-size: 0.82rem; line-height: 1.6; }

    /* ── QUOTA ── */
    .quota {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--dim);
      text-align: right;
      padding-top: 8px;
    }

    /* ── GAME CARD WRAPPER ── */
    .game-card-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.2s;
    }
    .game-card-wrap:hover { border-color: var(--border2); }

    /* ── NPB DAY TOGGLE ── */
    .day-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .day-toggle-btn {
      padding: 10px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'Inter', sans-serif;
    }

    /* ── MOBILE ── */
    @media (max-width: 500px) {
      .league-tabs { grid-template-columns: repeat(2,1fr); }
      .tab-btn .tab-label { display: none; }
      .header { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div>
      <div class="logo">
        <div class="logo-ball">⚾</div>
        BaseballIQ
      </div>
      <span class="logo-sub">Predictor · Props · Análisis</span>
    </div>
    <div class="header-right">
      MLB · MiLB · NCAA · NPB<br>
      <span id="quotaInfo">—</span>
    </div>
  </header>

  <!-- LEAGUE TABS -->
  <nav class="league-tabs" id="leagueTabs">
    <button class="tab-btn active" data-league="baseball_mlb" onclick="selectLeague(this)">
      <span class="tab-icon">⚾</span>
      <span class="tab-label">MLB</span>
    </button>
    <button class="tab-btn" data-league="baseball_milb" onclick="selectLeague(this)">
      <span class="tab-icon">🌱</span>
      <span class="tab-label">MiLB</span>
    </button>
    <button class="tab-btn" data-league="baseball_ncaa" onclick="selectLeague(this)">
      <span class="tab-icon">🎓</span>
      <span class="tab-label">NCAA</span>
    </button>
    <button class="tab-btn" data-league="baseball_npb" onclick="selectLeague(this)">
      <span class="tab-icon">🇯🇵</span>
      <span class="tab-label">NPB</span>
    </button>
  </nav>

  <!-- MAIN PANEL -->
  <main class="main-panel">

    <!-- Status bar -->
    <div class="status-bar">
      <span><span class="status-dot"></span><span id="statusText">Selecciona una liga</span></span>
      <span id="dateLabel"></span>
    </div>

    <!-- Games panel (MLB uses this div) -->
    <div id="mlbGamesPanel"></div>

  </main>

  <script>
    // Date display
    document.getElementById('dateLabel').textContent =
      new Date().toLocaleDateString('es-PA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

    function selectLeague(btn) {
      // Update tab styles
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.className = 'tab-btn';
      });
      var league = btn.dataset.league;
      var activeClass = 'tab-btn active';
      if(league === 'baseball_npb')  activeClass = 'tab-btn active-npb';
      if(league === 'baseball_ncaa') activeClass = 'tab-btn active-ncaa';
      if(league === 'baseball_milb') activeClass = 'tab-btn active-milb';
      btn.className = activeClass;

      document.getElementById('statusText').textContent = '⏳ Cargando partidos...';

      // Trigger the app.js league loader
      if(window._loadLeague) window._loadLeague(league);
    }

    // Auto-load MLB on start
    window.addEventListener('load', function() {
      setTimeout(function() {
        var mlbBtn = document.querySelector('[data-league="baseball_mlb"]');
        if(mlbBtn) selectLeague(mlbBtn);
      }, 200);
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
