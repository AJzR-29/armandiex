name: Update Natstat Stats

on:
  schedule:
    - cron: '0 2,8,14 * * *'   # 9pm, 3am, 9am hora Panamá
  workflow_dispatch:

jobs:
  fetch-natstat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Natstat fetch
        run: python fetch_natstat.py

      - name: Commit natstat_stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add natstat_stats.json
          git diff --cached --quiet || git commit -m "chore: update natstat_stats.json [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
