name: Update NPB Stats

on:
  schedule:
    # 8am y 2pm UTC (partidos NPB son 04:00-11:00 UTC)
    - cron: '0 8,14 * * *'
  workflow_dispatch:

jobs:
  fetch-npb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-npb

      - name: Install dependencies
        run: |
          pip install npb-scraper pandas requests beautifulsoup4

      - name: Run NPB fetch
        run: python fetch_npb_stats.py

      - name: Commit npb_stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add npb_stats.json
          git diff --cached --quiet || git commit -m "chore: update npb_stats.json [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
