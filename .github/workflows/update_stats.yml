name: Update MLB Stats

on:
  schedule:
    # Cada 2 horas entre 10am y 12am UTC (temporada MLB)
    - cron: '0 10,12,14,16,18,20,22,0 * * *'
  workflow_dispatch:   # permite correrlo manualmente desde GitHub

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pybaseball
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install pybaseball pandas numpy

      - name: Run fetch script
        run: python fetch_mlb_stats.py

      - name: Commit mlb_stats.json si cambió
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlb_stats.json
          git diff --cached --quiet || git commit -m "chore: update mlb_stats.json [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
